{% extends "base.html" %}
{% block title %}Password reset sent | MedEcho AI{% endblock %}
{% block content %}
<section class="relative mx-auto flex min-h-[calc(100vh-73px)] max-w-md items-center justify-center px-6 py-16">
    <div class="absolute top-1/2 left-1/2 h-[300px] w-[300px] -translate-x-1/2 -translate-y-1/2 rounded-full bg-emerald-600/10 blur-[100px] pointer-events-none"></div>
    
    <div class="relative z-10 w-full rounded-[2.5rem] border border-emerald-500/20 bg-emerald-950/10 p-10 text-center shadow-2xl backdrop-blur-xl">
        <div class="mx-auto mb-6 flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-emerald-400 to-teal-500 shadow-lg">
            <svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
        </div>
        
        <h1 class="text-3xl font-black text-white tracking-tight">Check your email</h1>
        <p class="mt-4 text-sm font-medium text-slate-300 leading-relaxed">If an account exists for that email, a password reset link has been sent to you.</p>
        
        <div class="mt-10">
            <a href="{% url 'login' %}" class="inline-flex w-full items-center justify-center rounded-xl bg-emerald-500 px-8 py-3.5 text-sm font-bold text-white transition-all hover:scale-[1.02] hover:bg-emerald-400 hover:shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                Back to login
            </a>
        </div>
    </div>
</section>
{% endblock %}
