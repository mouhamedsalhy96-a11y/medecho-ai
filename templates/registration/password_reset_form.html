{% extends "base.html" %}
{% block title %}Forgot password | MedEcho AI{% endblock %}
{% block content %}
<style>
    .premium-form input {
        width: 100%;
        border-radius: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(15, 23, 42, 0.6);
        padding: 0.75rem 1rem;
        color: white;
        outline: none;
        color-scheme: dark;
        transition: all 0.2s ease;
    }
    .premium-form input:focus {
        border-color: rgba(34, 211, 238, 0.5);
        box-shadow: 0 0 15px rgba(34, 211, 238, 0.15);
        background: rgba(15, 23, 42, 0.9);
    }
</style>

<section class="relative mx-auto flex min-h-[calc(100vh-73px)] max-w-md items-center justify-center px-6 py-16">
    <div class="absolute top-1/2 left-1/2 h-[300px] w-[300px] -translate-x-1/2 -translate-y-1/2 rounded-full bg-cyan-600/10 blur-[100px] pointer-events-none"></div>

    <div class="relative z-10 w-full rounded-[2.5rem] border border-white/5 bg-slate-900/40 p-8 md:p-10 shadow-2xl backdrop-blur-xl">
        <div class="text-center mb-8">
            <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-cyan-400 to-blue-600 shadow-lg">
                <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
            </div>
            <h1 class="text-2xl font-black text-white tracking-tight">Forgot password?</h1>
            <p class="mt-3 text-sm text-slate-400">Enter your email and we’ll send a reset link if an account exists.</p>
        </div>

        <form method="post" class="premium-form space-y-6">
            {% csrf_token %}
            <div>
                <label for="{{ form.email.id_for_label }}" class="block text-sm font-semibold text-slate-300 mb-2">Email address</label>
                {{ form.email }}
            </div>
            <button type="submit" class="w-full rounded-xl bg-white px-4 py-3.5 text-sm font-bold text-slate-900 shadow-lg transition-all hover:scale-[1.02] hover:bg-slate-200">
                Send reset link
            </button>
        </form>
        
        <p class="mt-8 text-center text-sm font-medium text-slate-400">
            <a href="{% url 'login' %}" class="font-bold text-cyan-400 hover:text-cyan-300 transition-colors">Back to login</a>
        </p>
    </div>
</section>
{% endblock %}
