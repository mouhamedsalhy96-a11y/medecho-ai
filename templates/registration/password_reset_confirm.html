{% extends "base.html" %}
{% block title %}Set new password | MedEcho AI{% endblock %}
{% block content %}
<style>
    /* Premium Form Styling */
    .premium-form input {
        width: 100%;
        border-radius: 0.75rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(15, 23, 42, 0.6);
        padding: 0.75rem 1rem;
        color: white;
        outline: none;
        color-scheme: dark;
        transition: all 0.2s ease;
    }
    .premium-form input:focus {
        border-color: rgba(34, 211, 238, 0.5);
        box-shadow: 0 0 15px rgba(34, 211, 238, 0.15);
        background: rgba(15, 23, 42, 0.9);
    }
    .premium-form p { margin-bottom: 1.5rem; }
    .premium-form label { display: block; font-size: 0.875rem; font-weight: 600; color: #cbd5e1; margin-bottom: 0.5rem; }
</style>

<section class="relative mx-auto flex min-h-[calc(100vh-73px)] max-w-md items-center justify-center px-6 py-16">
    <div class="absolute top-1/2 left-1/2 h-[300px] w-[300px] -translate-x-1/2 -translate-y-1/2 rounded-full bg-cyan-600/10 blur-[100px] pointer-events-none"></div>

    <div class="relative z-10 w-full rounded-[2.5rem] border border-white/5 bg-slate-900/40 p-8 md:p-10 shadow-2xl backdrop-blur-xl">
        <div class="text-center mb-8">
            <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-2xl bg-gradient-to-br from-cyan-400 to-blue-600 shadow-lg">
                <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tight">Set new password</h1>
        </div>
        
        {% if validlink %}
            <form method="post" class="premium-form space-y-6">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="pt-2 border-t border-white/5">
                    <button type="submit" class="mt-4 w-full rounded-xl bg-white px-4 py-3.5 text-sm font-bold text-slate-900 shadow-lg transition-all hover:scale-[1.02] hover:bg-slate-200">
                        Save Password
                    </button>
                </div>
            </form>
        {% else %}
            <div class="text-center">
                <div class="mb-6 rounded-2xl border border-red-500/20 bg-red-950/20 p-5 text-sm font-medium text-red-300">
                    This password reset link is invalid or has expired.
                </div>
                <a href="{% url 'password_reset' %}" class="inline-flex w-full items-center justify-center rounded-xl bg-cyan-400 px-4 py-3.5 text-sm font-bold text-slate-950 transition-all hover:scale-[1.02] hover:bg-cyan-300 hover:shadow-[0_0_15px_rgba(34,211,238,0.3)]">
                    Request a new link
                </a>
            </div>
        {% endif %}
    </div>
</section>
{% endblock %}
